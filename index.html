<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Game Mobile</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: #0f0f0f;
    overflow: hidden;
    font-family: sans-serif;
    color: white;
    touch-action: none;
  }

  .letter {
    position: absolute;
    font-size: 42px;
    font-weight: bold;
    user-select: none;
  }

  .win {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 24px;
    opacity: 0;
    transition: 0.3s;
  }

  .show {
    opacity: 1;
  }
</style>
</head>
<body>

<div class="win" id="win">🎉 YOU WIN 🎉</div>

<script>
const word = "MAGNET";
const letters = [];
let pointer = { x: window.innerWidth/2, y: window.innerHeight/2 };

const center = { x: window.innerWidth/2, y: window.innerHeight/2 };


word.split("").forEach(char => {
  const el = document.createElement("div");
  el.className = "letter";
  el.textContent = char;

  el.x = Math.random() * window.innerWidth;
  el.y = Math.random() * window.innerHeight;

  el.style.left = el.x + "px";
  el.style.top = el.y + "px";

  document.body.appendChild(el);
  letters.push(el);
});


function update() {
  letters.forEach(el => {
    const dx = pointer.x - el.x;
    const dy = pointer.y - el.y;

    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < 160) {
      el.x += dx * 0.08;
      el.y += dy * 0.08;
    }

    el.style.left = el.x + "px";
    el.style.top = el.y + "px";
  });

  checkWin();
  requestAnimationFrame(update);
}
update();


document.addEventListener("mousemove", (e) => {
  pointer.x = e.clientX;
  pointer.y = e.clientY;
});

document.addEventListener("touchmove", (e) => {
  pointer.x = e.touches[0].clientX;
  pointer.y = e.touches[0].clientY;
}, { passive: false });

function checkWin() {
  let win = true;

  letters.forEach(el => {
    const dx = el.x - center.x;
    const dy = el.y - center.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist > 80) win = false;
  });

  if (win) {
    document.getElementById("win").classList.add("show");
  }
}
</script>

</body>
</html>

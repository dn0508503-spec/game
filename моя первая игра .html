<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Magnetic Game</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: #0f0f0f;
    overflow: hidden;
    font-family: sans-serif;
    color: white;
  }

  .letter {
    position: absolute;
    font-size: 50px;
    font-weight: bold;
    transition: transform 0.2s;
  }

  .win {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 30px;
    opacity: 0;
    transition: 0.3s;
  }

  .show {
    opacity: 1;
  }
</style>
</head>
<body>

<div class="win" id="win">🎉 YOU WIN 🎉</div>

<script>
const word = "MAGNET";
const letters = [];
const center = { x: window.innerWidth/2, y: window.innerHeight/2 };


word.split("").forEach((char, i) => {
  const el = document.createElement("div");
  el.className = "letter";
  el.textContent = char;

 
  el.x = Math.random() * window.innerWidth;
  el.y = Math.random() * window.innerHeight;

  el.style.left = el.x + "px";
  el.style.top = el.y + "px";

  document.body.appendChild(el);
  letters.push(el);
});

// движение к курсору (магнит)
document.addEventListener("mousemove", (e) => {
  letters.forEach(el => {
    const dx = e.clientX - el.x;
    const dy = e.clientY - el.y;

    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < 150) {
      el.x += dx * 0.1;
      el.y += dy * 0.1;
    }

    el.style.left = el.x + "px";
    el.style.top = el.y + "px";
  });

  checkWin();
});


function checkWin() {
  let win = true;

  letters.forEach(el => {
    const dx = el.x - center.x;
    const dy = el.y - center.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist > 80) win = false;
  });

  if (win) {
    document.getElementById("win").classList.add("show");
  }
}
</script>

</body>
</html>
